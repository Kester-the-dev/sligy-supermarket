<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sligy E-commerce</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background-color: #f8f9fa; }
      h1 { color: #333; text-align: center; }
      .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
      .product { border: 1px solid #ddd; padding: 15px; background: white; border-radius: 8px; }
      .product img { width: 100%; height: 150px; object-fit: cover; }
      .product h3 { margin: 10px 0; }
      .product p { margin: 5px 0; }
      .price { font-weight: bold; color: #007bff; }
      button { background: #007bff; color: white; border: none; padding: 10px; cursor: pointer; border-radius: 4px; }
      button:hover { background: #0056b3; }
      .cart { margin-top: 20px; padding: 20px; background: white; border-radius: 8px; }
      .cart-item { display: flex; justify-content: space-between; margin: 10px 0; }
    </style>
  </head>
  <body>
    <h1>Welcome to Sligy E-commerce</h1>
    <p>Your one-stop shop for clothes, gadgets, phones, provisions, and supermarket items!</p>
    <div class="products" id="products"></div>
    <div class="cart">
      <h2>Shopping Cart</h2>
      <div id="cart-items"></div>
      <p id="total">Total: $0.00</p>
    </div>

    <script>
      let cart = [];

      async function loadProducts() {
        try {
          const response = await fetch('http://localhost:5000/api/products');
          const products = await response.json();
          displayProducts(products);
        } catch (error) {
          console.error('Error loading products:', error);
          document.getElementById('products').innerHTML = '<p>Unable to load products. Make sure the server is running.</p>';
        }
      }

      function displayProducts(products) {
        const container = document.getElementById('products');
        container.innerHTML = products.map(product => `
          <div class="product">
            <img src="${product.image}" alt="${product.name}">
            <h3>${product.name}</h3>
            <p>${product.description}</p>
            <p class="price">$${product.price}</p>
            <button onclick="addToCart(${product.id}, '${product.name}', ${product.price})">Add to Cart</button>
          </div>
        `).join('');
      }

      function addToCart(id, name, price) {
        const existing = cart.find(item => item.id === id);
        if (existing) {
          existing.quantity++;
        } else {
          cart.push({ id, name, price, quantity: 1 });
        }
        updateCart();
      }

      function updateCart() {
        const container = document.getElementById('cart-items');
        container.innerHTML = cart.map(item => `
          <div class="cart-item">
            <span>${item.name} (x${item.quantity})</span>
            <span>$${(item.price * item.quantity).toFixed(2)}</span>
          </div>
        `).join('');
        const total = cart.reduce((sum, item) => sum + item.price * item.quantity, 0);
        document.getElementById('total').textContent = `Total: $${total.toFixed(2)}`;
      }

      loadProducts();
    </script>
  </body>
</html>
